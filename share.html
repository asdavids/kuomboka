<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Default meta tags — replaced by JS after fetching article -->
  <title>Kuomboka.com</title>
  <meta name="description" content="Kuomboka ceremony — the royal journey of the Litunga across the Barotse Floodplain, Zambia."/>
  <meta property="og:site_name" content="Kuomboka.com"/>
  <meta property="og:type" content="article"/>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .card{max-width:680px;width:100%;margin:2rem auto;}
    .img{width:100%;aspect-ratio:1200/630;object-fit:cover;display:block;background:#1a1a1a;}
    .body{padding:2rem;background:#111;}
    .cat{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:#A57B0A;margin-bottom:.8rem;}
    h1{font-size:1.4rem;line-height:1.3;margin-bottom:1rem;color:#fff;}
    p{font-size:.95rem;line-height:1.7;color:rgba(255,255,255,.6);margin-bottom:1.5rem;}
    a.btn{display:inline-block;padding:.9rem 2rem;background:#A57B0A;color:#000;font-weight:700;text-decoration:none;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;}
    .site{font-size:.7rem;color:rgba(255,255,255,.25);margin-top:1rem;}
    .loading{text-align:center;padding:4rem;color:rgba(255,255,255,.3);font-size:.9rem;}
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="loading">Loading article...</div>
</div>

<script>
const SB_URL = 'https://gintajtpcijppyqkojga.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpbnRhanRwY2lqcHB5cWtvamdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDM4MjEsImV4cCI6MjA4ODkxOTgyMX0.rxU8EgKQM3RYrcql7CRnnX9jhmc2D1xNXTYjxcG99TM';

async function load() {
  const slug = new URLSearchParams(window.location.search).get('slug');
  if (!slug) { window.location.href = '/'; return; }

  try {
    const res = await fetch(`${SB_URL}/rest/v1/news_articles?slug=eq.${slug}&published=eq.true&select=title,excerpt,image_url,category`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    const data = await res.json();
    const article = data[0];
    if (!article) { window.location.href = '/news'; return; }

    const title = article.title;
    const desc = article.excerpt || 'Read this article on Kuomboka.com';
    const image = article.image_url || 'https://gintajtpcijppyqkojga.supabase.co/storage/v1/object/public/gallery/ChatGPT_Image_Apr_4__2026__12_04_19_AM.png';
    const articleUrl = `/blog?slug=${slug}`;

    // Update page title and meta
    document.title = title + ' | Kuomboka.com';

    // Render card
    document.getElementById('card').innerHTML = `
      <img class="img" src="${image}" alt="${title}"/>
      <div class="body">
        <div class="cat">${article.category || 'Kuomboka.com'}</div>
        <h1>${title}</h1>
        <p>${desc}</p>
        <a class="btn" href="${articleUrl}">Read Full Article →</a>
        <p class="site">kuomboka.com</p>
      </div>`;

    // Redirect real visitors to the article after 1 second
    setTimeout(() => { window.location.href = articleUrl; }, 1000);

  } catch(e) {
    window.location.href = '/news';
  }
}

load();
</script>
</body>
</html>
